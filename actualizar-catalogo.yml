name: Actualizar catálogo

on:
  schedule:
    - cron: "0 12 * * 1"   # lunes 12:00 UTC (6:00 CDMX)
  workflow_dispatch:        # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar yt-dlp
        run: pip install yt-dlp

      - name: Regenerar catálogo
        run: python3 actualizar_catalogo.py

      - name: Commit si hay cambios
        run: |
          git config user.name "afp-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet; then
            N=$(python3 -c "import json;print(len(json.load(open('catalog.json'))))")
            git add index.html catalog.json
            git commit -m "Catálogo actualizado: $N películas"
            git push
          else
            echo "Sin cambios en el canal."
          fi
